<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Customer Data System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .error-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            padding: 3rem;
            text-align: center;
            max-width: 500px;
        }

        .error-icon {
            font-size: 4rem;
            color: #dc3545;
            margin-bottom: 1.5rem;
        }
    </style>
</head>

<body>
    <div class="error-card">
        <i class="fas fa-exclamation-triangle error-icon"></i>
        <h1 class="mb-3">Oops! Something went wrong</h1>
        <p class="text-muted mb-4">
            We encountered an unexpected error while processing your request.
            Don't worry, your data has been saved successfully.
        </p>

        <div class="alert alert-success" role="alert">
            <i class="fas fa-check-circle me-2"></i>
            <strong>Good News!</strong> Your customer data has been saved to the database.
        </div>

        <div class="d-grid gap-2 d-md-flex justify-content-md-center mt-4">
            <a href="/dashboard" class="btn btn-primary me-md-2">
                <i class="fas fa-home me-2"></i>Go to Dashboard
            </a>
            <a href="/customers" class="btn btn-outline-primary">
                <i class="fas fa-list me-2"></i>View Customers
            </a>
        </div>

        <div class="mt-4">
            <small class="text-muted">
                Error occurred at: <span th:text="${timestamp}">timestamp</span>
            </small>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
