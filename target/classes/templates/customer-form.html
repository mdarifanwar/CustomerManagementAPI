<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Form - Customer Data System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .form-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            border: none;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        }

        .form-label {
            font-weight: 600;
            color: #495057;
        }

        .required {
            color: #dc3545;
        }
    </style>
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/dashboard">
                <i class="fas fa-users me-2"></i>Customer Data System
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/dashboard">
                    <i class="fas fa-tachometer-alt me-1"></i>Dashboard
                </a>
                <a class="nav-link" href="/customers">
                    <i class="fas fa-list me-1"></i>View Customers
                </a>
                <a class="nav-link" href="/logout">
                    <i class="fas fa-sign-out-alt me-1"></i>Logout
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-4">
        <div class="form-container">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0">
                        <i class="fas fa-user-edit me-2"></i>
                        <span th:text="${customer.id != null ? 'Edit Customer' : 'Add New Customer'}">Customer
                            Form</span>
                    </h4>
                </div>
                <div class="card-body">
                    <!-- Error Message -->
                    <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        <span th:text="${errorMessage}"></span>
                    </div>

                    <!-- Customer Form -->
                    <form th:action="@{/customer/save}" th:object="${customer}" method="post">
                        <input type="hidden" th:field="*{id}" />

                        <div class="row">
                            <div class="col-md-12 mb-3">
                                <label for="name" class="form-label">
                                    <i class="fas fa-user me-2"></i>Full Name <span class="required">*</span>
                                </label>
                                <input type="text" class="form-control" th:field="*{name}"
                                    th:class="${#fields.hasErrors('name')} ? 'form-control is-invalid' : 'form-control'"
                                    placeholder="Enter full name" required>
                                <div th:if="${#fields.hasErrors('name')}" class="invalid-feedback">
                                    <span th:errors="*{name}"></span>
                                </div>
                            </div>

                            <div class="col-md-12 mb-3">
                                <label for="email" class="form-label">
                                    <i class="fas fa-envelope me-2"></i>Email Address <span class="required">*</span>
                                </label>
                                <input type="email" class="form-control" th:field="*{email}"
                                    th:class="${#fields.hasErrors('email')} ? 'form-control is-invalid' : 'form-control'"
                                    placeholder="Enter email address" required>
                                <div th:if="${#fields.hasErrors('email')}" class="invalid-feedback">
                                    <span th:errors="*{email}"></span>
                                </div>
                            </div>

                            <div class="col-md-12 mb-3">
                                <label for="phoneNumber" class="form-label">
                                    <i class="fas fa-phone me-2"></i>Phone Number <span class="required">*</span>
                                </label>
                                <input type="tel" class="form-control" th:field="*{phoneNumber}"
                                    th:class="${#fields.hasErrors('phoneNumber')} ? 'form-control is-invalid' : 'form-control'"
                                    placeholder="Enter phone number" required>
                                <div th:if="${#fields.hasErrors('phoneNumber')}" class="invalid-feedback">
                                    <span th:errors="*{phoneNumber}"></span>
                                </div>
                            </div>

                            <div class="col-md-12 mb-3">
                                <label for="address" class="form-label">
                                    <i class="fas fa-map-marker-alt me-2"></i>Address <span class="required">*</span>
                                </label>
                                <textarea class="form-control" th:field="*{address}" rows="3"
                                    th:class="${#fields.hasErrors('address')} ? 'form-control is-invalid' : 'form-control'"
                                    placeholder="Enter complete address" required></textarea>
                                <div th:if="${#fields.hasErrors('address')}" class="invalid-feedback">
                                    <span th:errors="*{address}"></span>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-12">
                                <button type="submit" class="btn btn-primary me-2">
                                    <i class="fas fa-save me-2"></i>
                                    <span th:text="${customer.id != null ? 'Update Customer' : 'Save Customer'}">Save
                                        Customer</span>
                                </button>
                                <a href="/customers" class="btn btn-secondary">
                                    <i class="fas fa-times me-2"></i>Cancel
                                </a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Help Section -->
            <div class="card mt-4">
                <div class="card-body">
                    <h6 class="card-title">
                        <i class="fas fa-info-circle me-2"></i>Instructions
                    </h6>
                    <ul class="mb-0">
                        <li>All fields marked with <span class="required">*</span> are required</li>
                        <li>Email address must be valid and unique</li>
                        <li>Phone number should be in valid format</li>
                        <li>Address should be complete for better communication</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
