<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Customer Data System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .navbar-brand {
            font-weight: bold;
        }

        .card {
            border: none;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .action-card {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .view-card {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }
    </style>
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/dashboard">
                <i class="fas fa-users me-2"></i>Customer Data System
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/logout">
                    <i class="fas fa-sign-out-alt me-1"></i>Logout
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-12">
                <h1 class="mb-4">
                    <i class="fas fa-tachometer-alt me-2"></i>Dashboard
                </h1>
            </div>
        </div>

        <!-- Dashboard Cards -->
        <div class="row g-4">
            <!-- Statistics Card -->
            <div class="col-md-4">
                <div class="card stat-card h-100">
                    <div class="card-body text-center d-flex flex-column justify-content-between">
                        <div>
                            <i class="fas fa-users fa-3x mb-3"></i>
                            <h2 class="card-title" th:text="${customerCount}">0</h2>
                            <p class="card-text">Total Customers</p>
                        </div>
                        <div class="mt-3">
                            <a href="/customers" class="btn btn-light">
                                <i class="fas fa-chart-bar me-2"></i>View Details
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Add Customer Card -->
            <div class="col-md-4">
                <div class="card action-card h-100">
                    <div class="card-body text-center d-flex flex-column justify-content-between">
                        <div>
                            <i class="fas fa-user-plus fa-3x mb-3"></i>
                            <h5 class="card-title">Add New Customer</h5>
                            <p class="card-text">Enter customer details and save to database</p>
                        </div>
                        <div class="mt-3">
                            <a href="/customer/new" class="btn btn-light">
                                <i class="fas fa-plus me-2"></i>Add Customer
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- View Customers Card -->
            <div class="col-md-4">
                <div class="card view-card h-100">
                    <div class="card-body text-center d-flex flex-column justify-content-between">
                        <div>
                            <i class="fas fa-list fa-3x mb-3"></i>
                            <h5 class="card-title">View All Customers</h5>
                            <p class="card-text">Browse and manage customer records</p>
                        </div>
                        <div class="mt-3">
                            <a href="/customers" class="btn btn-light">
                                <i class="fas fa-eye me-2"></i>View Customers
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
